name: "Energy Management System (EMS)"
description: "Smart energy management for homes with Solar, Battery and Dynamic Tariffs."
version: "1.0.7"
slug: "ems"
url: "https://github.com/xpoh697/EMS_HA_ADDON"
maintainer: "Expert EMS Team"
hassio_api: true
hassio_role: admin
init: false

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: "services"
boot: "auto"
ingress: true
ingress_port: 8000
panel_icon: "mdi:lightning-bolt-circle"
panel_title: "EMS Control"
options:
  log_level: "info"
  dry_run: true
  history_days: 7
  ha_token: ""
schema:
  log_level: "list(trace|debug|info|warning|error|fatal)"
  dry_run: "bool"
  history_days: "int(1,60)"
  ha_token: "string?"
ports:
  8000/tcp: 8000
